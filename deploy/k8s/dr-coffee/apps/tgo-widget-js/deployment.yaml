apiVersion: apps/v1
kind: Deployment
metadata:
  name: tgo-widget-js
  namespace: dr-coffee-test
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tgo-widget-js
  template:
    metadata:
      labels:
        app: tgo-widget-js
    spec:
      imagePullSecrets:
        - name: aliyun-registry-secret
      containers:
        - name: tgo-widget-js
          image: dr-acr-registry.cn-hangzhou.cr.aliyuncs.com/dr-coffee/tgo-widget-js:latest
          imagePullPolicy: Always
          command:
            - /bin/sh
            - -c
          args:
            - |
              cat > /usr/share/nginx/html/env-config.js <<EOF
              window.ENV = {
                VITE_API_BASE_URL: '${VITE_API_BASE_URL}',
                VITE_PLATFORM_API_KEY: '${VITE_PLATFORM_API_KEY}',
              };
              EOF
              exec nginx -g "daemon off;"
          ports:
            - name: http
              containerPort: 80
          envFrom:
            - configMapRef:
                name: tgo-widget-js-config
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
