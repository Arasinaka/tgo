apiVersion: apps/v1
kind: Deployment
metadata:
  name: tgo-workflow
  namespace: dr-coffee-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tgo-workflow
  template:
    metadata:
      labels:
        app: tgo-workflow
    spec:
      imagePullSecrets:
        - name: aliyun-registry-secret
      containers:
        - name: tgo-workflow
          image: dr-acr-registry.cn-hangzhou.cr.aliyuncs.com/dr-coffee/tgo-workflow:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: tgo-workflow-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: tgo-postgres
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: tgo-redis
                  key: url-db0
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
