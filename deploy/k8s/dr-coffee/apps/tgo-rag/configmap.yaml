apiVersion: v1
kind: ConfigMap
metadata:
  name: tgo-rag-config
  namespace: dr-coffee-test
data:
  ENVIRONMENT: production
  LOG_LEVEL: INFO
  UPLOAD_DIR: /app/uploads
  CORS_ORIGINS: '["https://tgo-admin.dr-coffee.cn","https://tgo-api.dr-coffee.cn"]'
  EMBEDDING_PROVIDER: qwen3
  QWEN3_BASE_URL: https://dashscope.aliyuncs.com/compatible-mode/v1
  QWEN3_MODEL: text-embedding-v4
