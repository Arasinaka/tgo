apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tgo-api
  namespace: dr-coffee-test
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: tgo-api.dr-coffee.cn
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: tgo-api
                port:
                  name: http
  tls:
    - hosts:
        - tgo-api.dr-coffee.cn
      secretName: tgo-api-tls
