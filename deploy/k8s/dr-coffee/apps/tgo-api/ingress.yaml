apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tgo-api
  namespace: dr-coffee-test
spec:
  rules:
    - host: tgo-api.dr-coffee.cn
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: tgo-api
                port:
                  name: http
