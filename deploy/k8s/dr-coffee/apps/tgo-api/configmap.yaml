apiVersion: v1
kind: ConfigMap
metadata:
  name: tgo-api-config
  namespace: dr-coffee-test
data:
  API_BASE_URL: https://tgo-api.dr-coffee.cn
  BACKEND_CORS_ORIGINS: '["https://tgo-admin.dr-coffee.cn","https://tgo-widget.dr-coffee.cn","https://tgo-api.dr-coffee.cn"]'
  INTERNAL_SERVICE_HOST: 0.0.0.0
  INTERNAL_SERVICE_PORT: "8001"
  AI_SERVICE_URL: http://tgo-ai:8081
  AI_SERVICE_TIMEOUT: "30"
  RAG_SERVICE_URL: http://tgo-rag:8082
  RAG_SERVICE_TIMEOUT: "30"
  PLATFORM_SERVICE_URL: http://tgo-platform:8003
  WORKFLOW_SERVICE_URL: http://tgo-workflow:8000
  PLUGIN_RUNTIME_URL: http://tgo-plugin-runtime:8090
  DEVICE_CONTROL_SERVICE_URL: http://tgo-device-control:8085
  WUKONGIM_ENABLED: "true"
  WUKONGIM_DEVICE_FLAG: "1"
  WUKONGIM_DEVICE_LEVEL: "1"
  STORAGE_TYPE: local
  UPLOAD_BASE_DIR: /app/uploads
  MAX_UPLOAD_SIZE_MB: "10"
  STORE_SERVICE_URL: https://store.dr-coffee.cn
  STORE_WEB_URL: https://store.dr-coffee.cn
