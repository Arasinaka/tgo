apiVersion: apps/v1
kind: Deployment
metadata:
  name: tgo-web
  namespace: dr-coffee-test
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tgo-web
  template:
    metadata:
      labels:
        app: tgo-web
    spec:
      imagePullSecrets:
        - name: aliyun-registry-secret
      containers:
        - name: tgo-web
          image: dr-acr-registry.cn-hangzhou.cr.aliyuncs.com/dr-coffee/tgo-web:latest
          imagePullPolicy: Always
          command:
            - /bin/sh
            - -c
          args:
            - |
              cat > /usr/share/nginx/html/env-config.js <<EOF
              window.ENV = {
                VITE_API_BASE_URL: '${VITE_API_BASE_URL}',
                VITE_DEBUG_MODE: ${VITE_DEBUG_MODE:-false},
                VITE_WIDGET_PREVIEW_URL: '${VITE_WIDGET_PREVIEW_URL}',
                VITE_WIDGET_SCRIPT_BASE: '${VITE_WIDGET_SCRIPT_BASE}',
                VITE_WIDGET_DEMO_URL: '${VITE_WIDGET_DEMO_URL}',
                VITE_DISABLE_WEBSOCKET_AUTO_CONNECT: '${VITE_DISABLE_WEBSOCKET_AUTO_CONNECT:-false}',
                VITE_STORE_API_URL: '${VITE_STORE_API_URL}',
              };
              EOF
              cat > /etc/nginx/conf.d/default.conf <<'EOF_NGINX'
              server {
                  listen 80;
                  server_name _;
                  root /usr/share/nginx/html;
                  index index.html;

                  gzip on;
                  gzip_vary on;
                  gzip_min_length 1024;
                  gzip_proxied any;
                  gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml;

                  set_real_ip_from 10.0.0.0/8;
                  set_real_ip_from 172.16.0.0/12;
                  set_real_ip_from 192.168.0.0/16;
                  set_real_ip_from 127.0.0.1;
                  real_ip_header X-Forwarded-For;
                  real_ip_recursive on;

                  location = /env-config.js {
                      expires -1;
                      add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
                      try_files /env-config.js =404;
                  }

                  location / {
                      try_files $uri $uri/ /index.html;
                      add_header X-Frame-Options "SAMEORIGIN" always;
                      add_header X-Content-Type-Options "nosniff" always;
                      add_header X-XSS-Protection "1; mode=block" always;
                  }

                  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                      expires 1y;
                      add_header Cache-Control "public, immutable";
                      try_files $uri =404;
                  }

                  location ~* \.html$ {
                      expires -1;
                      add_header Cache-Control "no-store, no-cache, must-revalidate" always;
                  }

                  location /health {
                      access_log off;
                      add_header Content-Type text/plain;
                      return 200 "OK\n";
                  }
              }
              EOF_NGINX
              exec nginx -g "daemon off;"
          ports:
            - name: http
              containerPort: 80
          envFrom:
            - configMapRef:
                name: tgo-web-config
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
