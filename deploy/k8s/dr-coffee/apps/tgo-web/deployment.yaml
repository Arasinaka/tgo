apiVersion: apps/v1
kind: Deployment
metadata:
  name: tgo-web
  namespace: dr-coffee-test
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tgo-web
  template:
    metadata:
      labels:
        app: tgo-web
    spec:
      imagePullSecrets:
        - name: aliyun-registry-secret
      containers:
        - name: tgo-web
          image: dr-acr-registry.cn-hangzhou.cr.aliyuncs.com/dr-coffee/tgo-web:latest
          imagePullPolicy: Always
          command:
            - /bin/sh
            - -c
          args:
            - |
              cat > /usr/share/nginx/html/env-config.js <<EOF
              window.ENV = {
                VITE_API_BASE_URL: '${VITE_API_BASE_URL}',
                VITE_DEBUG_MODE: ${VITE_DEBUG_MODE:-false},
                VITE_WIDGET_PREVIEW_URL: '${VITE_WIDGET_PREVIEW_URL}',
                VITE_WIDGET_SCRIPT_BASE: '${VITE_WIDGET_SCRIPT_BASE}',
                VITE_WIDGET_DEMO_URL: '${VITE_WIDGET_DEMO_URL}',
                VITE_DISABLE_WEBSOCKET_AUTO_CONNECT: '${VITE_DISABLE_WEBSOCKET_AUTO_CONNECT:-false}',
                VITE_STORE_API_URL: '${VITE_STORE_API_URL}',
              };
              EOF
              exec nginx -g "daemon off;"
          ports:
            - name: http
              containerPort: 80
          envFrom:
            - configMapRef:
                name: tgo-web-config
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
