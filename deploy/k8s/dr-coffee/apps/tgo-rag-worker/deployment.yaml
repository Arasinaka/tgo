apiVersion: apps/v1
kind: Deployment
metadata:
  name: tgo-rag-worker
  namespace: dr-coffee-test
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: tgo-rag-worker
  template:
    metadata:
      labels:
        app: tgo-rag-worker
    spec:
      imagePullSecrets:
        - name: aliyun-registry-secret
      securityContext:
        fsGroup: 999
        fsGroupChangePolicy: OnRootMismatch
      initContainers:
        - name: fix-uploads-permissions
          image: dr-acr-registry.cn-hangzhou.cr.aliyuncs.com/dr-coffee/tgo-rag:latest
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - chown -R 999:999 /app/uploads && chmod -R ug+rwX /app/uploads
          securityContext:
            runAsUser: 0
            runAsGroup: 0
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
      containers:
        - name: tgo-rag-worker
          image: dr-acr-registry.cn-hangzhou.cr.aliyuncs.com/dr-coffee/tgo-rag:latest
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - celery -A src.rag_service.tasks.celery_app worker --loglevel=info --hostname=worker@tgo-rag-worker -Q document_processing,embedding,website_crawling,qa_processing,celery
          envFrom:
            - configMapRef:
                name: tgo-rag-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: tgo-postgres
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: tgo-redis
                  key: url-db0
            - name: QWEN3_API_KEY
              valueFrom:
                secretKeyRef:
                  name: tgo-app-secrets
                  key: QWEN3_API_KEY
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: tgo-rag-uploads
