apiVersion: apps/v1
kind: Deployment
metadata:
  name: tgo-plugin-runtime
  namespace: dr-coffee-test
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: tgo-plugin-runtime
  template:
    metadata:
      labels:
        app: tgo-plugin-runtime
    spec:
      imagePullSecrets:
        - name: aliyun-registry-secret
      containers:
        - name: tgo-plugin-runtime
          image: dr-acr-registry.cn-hangzhou.cr.aliyuncs.com/dr-coffee/tgo-plugin-runtime:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8090
          envFrom:
            - configMapRef:
                name: tgo-plugin-runtime-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: tgo-postgres
                  key: database-url
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: tgo-app-secrets
                  key: SECRET_KEY
          volumeMounts:
            - name: plugins
              mountPath: /var/lib/tgo/plugins
            - name: runtime-socket
              mountPath: /var/run/tgo
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        - name: plugins
          persistentVolumeClaim:
            claimName: tgo-plugin-runtime-plugins
        - name: runtime-socket
          emptyDir: {}
