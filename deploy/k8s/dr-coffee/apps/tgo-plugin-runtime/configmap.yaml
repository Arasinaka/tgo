apiVersion: v1
kind: ConfigMap
metadata:
  name: tgo-plugin-runtime-config
  namespace: dr-coffee-test
data:
  SERVICE_NAME: TGO Plugin Runtime
  HOST: 0.0.0.0
  PORT: "8090"
  AI_SERVICE_URL: http://tgo-ai:8081
  AI_SERVICE_TIMEOUT: "30"
  PLUGIN_SOCKET_PATH: /var/run/tgo/tgo.sock
  PLUGIN_REQUEST_TIMEOUT: "30"
  PLUGIN_PING_INTERVAL: "30"
  PLUGIN_BASE_PATH: /var/lib/tgo/plugins
  LOG_LEVEL: INFO
  ENVIRONMENT: production
  DEBUG: "false"
