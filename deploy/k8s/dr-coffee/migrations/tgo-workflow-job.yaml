apiVersion: batch/v1
kind: Job
metadata:
  name: tgo-workflow-migrate
  namespace: dr-coffee-test
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      restartPolicy: Never
      imagePullSecrets:
        - name: aliyun-registry-secret
      containers:
        - name: migrate
          image: dr-acr-registry.cn-hangzhou.cr.aliyuncs.com/dr-coffee/tgo-workflow:latest
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - DATABASE_URL="$(printf '%s' "$DATABASE_URL" | sed 's/%/%%/g')" alembic upgrade head
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: tgo-postgres
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: tgo-redis
                  key: url-db0
            - name: AI_SERVICE_URL
              value: http://tgo-ai:8081
