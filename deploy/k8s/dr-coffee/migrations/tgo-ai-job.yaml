apiVersion: batch/v1
kind: Job
metadata:
  name: tgo-ai-migrate
  namespace: dr-coffee-test
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      restartPolicy: Never
      imagePullSecrets:
        - name: aliyun-registry-secret
      containers:
        - name: migrate
          image: dr-acr-registry.cn-hangzhou.cr.aliyuncs.com/dr-coffee/tgo-ai:latest
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c", "alembic upgrade head"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: tgo-postgres
                  key: database-url
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: tgo-app-secrets
                  key: SECRET_KEY
