apiVersion: batch/v1
kind: Job
metadata:
  name: tgo-rag-migrate
  namespace: dr-coffee-test
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      restartPolicy: Never
      imagePullSecrets:
        - name: aliyun-registry-secret
      containers:
        - name: migrate
          image: dr-acr-registry.cn-hangzhou.cr.aliyuncs.com/dr-coffee/tgo-rag:latest
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c", "alembic upgrade head"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: tgo-postgres
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: tgo-redis
                  key: url-db0
            - name: EMBEDDING_PROVIDER
              value: qwen3
            - name: QWEN3_API_KEY
              valueFrom:
                secretKeyRef:
                  name: tgo-app-secrets
                  key: QWEN3_API_KEY
            - name: QWEN3_BASE_URL
              value: https://dashscope.aliyuncs.com/compatible-mode/v1
