apiVersion: batch/v1
kind: Job
metadata:
  name: tgo-api-migrate
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: ghcr.io/tgoai/tgo/tgo-api:REPLACE_TAG
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c", "alembic upgrade head"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: tgo-postgres
                  key: database-url
            - name: SECRET_KEY
              value: REPLACE_ME_API_SECRET_KEY
