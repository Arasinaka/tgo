apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tgo-web
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - admin.example.com
      secretName: tgo-web-tls
  rules:
    - host: admin.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: tgo-web
                port:
                  name: http
