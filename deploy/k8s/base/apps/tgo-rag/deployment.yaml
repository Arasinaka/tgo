apiVersion: apps/v1
kind: Deployment
metadata:
  name: tgo-rag
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tgo-rag
  template:
    metadata:
      labels:
        app: tgo-rag
    spec:
      containers:
        - name: tgo-rag
          image: ghcr.io/tgoai/tgo/tgo-rag:REPLACE_TAG
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8082
          envFrom:
            - configMapRef:
                name: tgo-rag-config
            - secretRef:
                name: tgo-rag-secret
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: tgo-postgres
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: tgo-redis
                  key: url-db2
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 45
            periodSeconds: 20
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: tgo-rag-uploads
