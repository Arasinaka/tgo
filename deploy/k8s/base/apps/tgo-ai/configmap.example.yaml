apiVersion: v1
kind: ConfigMap
metadata:
  name: tgo-ai-config
  namespace: tgo
data:
  API_SERVICE_URL: http://tgo-api:8000
  RAG_SERVICE_URL: http://tgo-rag:8082
  WORKFLOW_SERVICE_URL: http://tgo-workflow:8000
  PLUGIN_RUNTIME_URL: http://tgo-plugin-runtime:8090
  DEVICE_CONTROL_MCP_ENDPOINT: http://tgo-device-control:8085/mcp/{device_id}
  SKILLS_BASE_DIR: /data/skills
  CORS_ORIGINS: '["https://admin.example.com","https://api.example.com"]'
  ENVIRONMENT: production
  LOG_LEVEL: INFO
