apiVersion: apps/v1
kind: Deployment
metadata:
  name: tgo-ai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tgo-ai
  template:
    metadata:
      labels:
        app: tgo-ai
    spec:
      containers:
        - name: tgo-ai
          image: ghcr.io/tgoai/tgo/tgo-ai:REPLACE_TAG
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8081
          envFrom:
            - configMapRef:
                name: tgo-ai-config
            - secretRef:
                name: tgo-ai-secret
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: tgo-postgres
                  key: database-url
          volumeMounts:
            - name: skills
              mountPath: /data/skills
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        - name: skills
          persistentVolumeClaim:
            claimName: tgo-ai-skills
