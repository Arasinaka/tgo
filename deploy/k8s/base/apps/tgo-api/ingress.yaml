apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tgo-api
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.example.com
      secretName: tgo-api-tls
  rules:
    - host: api.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: tgo-api
                port:
                  name: http
