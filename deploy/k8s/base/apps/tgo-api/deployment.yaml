apiVersion: apps/v1
kind: Deployment
metadata:
  name: tgo-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tgo-api
  template:
    metadata:
      labels:
        app: tgo-api
    spec:
      containers:
        - name: tgo-api
          image: ghcr.io/tgoai/tgo/tgo-api:REPLACE_TAG
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
            - name: internal
              containerPort: 8001
          envFrom:
            - configMapRef:
                name: tgo-api-config
            - secretRef:
                name: tgo-api-secret
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: tgo-postgres
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: tgo-redis
                  key: url-db0
            - name: WUKONGIM_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: tgo-wukongim
                  key: api-url
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - curl -fsS http://127.0.0.1:8000/health && curl -fsS http://127.0.0.1:8001/health
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - curl -fsS http://127.0.0.1:8000/health && curl -fsS http://127.0.0.1:8001/health
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
